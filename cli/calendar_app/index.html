<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalendarApp</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="standard">
  <div class="app-shell">
    <div class="calendar-wrapper">
      <div class="calendar-header">
        <button id="btnPrev" type="button">Back</button>
        <button id="btnSettings" type="button" aria-label="Settings">⚙</button>
        <button id="btnNext" type="button">Next</button>
      </div>

      <div id="divCal"></div>
    </div>

    <aside id="notesPanel" class="notes-panel hidden">
      <div id="notesPanelContent"></div>
    </aside>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
