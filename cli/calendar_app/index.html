<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalendarApp</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="standard" data-mode="light">
  <div class="app-shell">
    <div class="calendar-wrapper">
      <div class="calendar-header">
        <div class="calendar-header-top">
          <button id="btnPrev" type="button" class="header-nav-btn">Back</button>
          <button id="btnSettings" type="button" aria-label="Settings">
            <span class="settings-icon" aria-hidden="true">⚙</span>
          </button>
          <button id="btnNext" type="button" class="header-nav-btn">Next</button>
        </div>
        <div class="calendar-header-view">
          <span class="visually-hidden" id="viewSpanLabel">View</span>
          <div class="view-span-control" role="group" aria-labelledby="viewSpanLabel">
            <div class="view-span-track" id="viewSpanTrack">
              <div class="view-span-thumb" id="viewSpanThumb" aria-hidden="true"></div>
              <button type="button" class="view-span-btn" data-value="1" role="radio" aria-checked="false"></button>
              <button type="button" class="view-span-btn" data-value="3" role="radio" aria-checked="false"></button>
              <button type="button" class="view-span-btn" data-value="7" role="radio" aria-checked="false"></button>
              <button type="button" class="view-span-btn" data-value="month" role="radio" aria-checked="false"></button>
            </div>
          </div>
        </div>
      </div>

      <div id="divCal"></div>
    </div>

    <aside id="notesPanel" class="notes-panel hidden">
      <div id="notesPanelContent"></div>
    </aside>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
